<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>新規投稿</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
  </head>
<body>
  <h1>
    新しい記録を投稿
  </h1>
  <form th:action = "@{/posts}" th:object = "${forumForm}" method="post">
    <div>
      <label for = "title">
        タイトル:
      </label>
      <br>
      <input type="text" id="title" th:field = "*{title}" required size = "50">
    </div>
    <div style="margin-top: 15px;">
      <label for="text">
        本文
      </label>
      <br>
      <textarea id="text" th:field = "*{text}" rows="10" cols="50"></textarea>
    </div>
    <div style = "margin-top: 15px;">
      <label>公開期限:</label><br>
      <input type="radio" name="expires" id="1day" value="1day" th:field="*{expires}"><label for="1day">1日</label>
      <input type="radio" name="expires" id="2days" value="2days" th:field="*{expires}"><label for="2days">2日</label>
      <input type="radio" name="expires" id="3days" value="3days" th:field="*{expires}"><label for="3days">3日</label>
      <input type="radio" name="expires" id="4days" value="4days" th:field="*{expires}"><label for="4days">4日</label>
      <input type="radio" name="expires" id="5days" value="5days" th:field="*{expires}"><label for="5days">5日</label>
      <input type="radio" name="expires" id="6days" value="6days" th:field="*{expires}"><label for="6days">6日</label>
      <input type="radio" name="expires" id="7days" value="7days" th:field="*{expires}"><label for="7days">7日</label>
      <input type="radio" name="expires" id="permanent" value="permanent" th:field="*{expires}"><label for="permanent">永続</label>
    </div>
    <div style="margin-top: 15px;">
      <label>タグ(最大10個まで)</label>
      <div id="tag-container">
        <div class="tag-input-wrapper">
          <input type="text" name="tags[0]" placeholder="タグを入力" class="tag-input" autocomplete="off">
          <ul class="suggestions-list"></ul>
        </div>
      </div>
    </div>

    <div style = "margin-top: 15px;">
      <button type = "submit">
        投稿する
      </button>
    </div>
  </form>
  <p>
    <a th:href="@{/}">トップに戻る</a>
  </p>
  <script th:src = "@{/js/tag-form.js}"></script>
</body>
</html>
